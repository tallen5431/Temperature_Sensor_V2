# TempSensor — homelab deployment.
#
# mDNS probe auto-discovery requires the host network stack, so the default
# service uses `network_mode: host` (Linux). On Docker Desktop (macOS/Windows)
# host networking is limited; use the `bridge` override below and point probes
# at the host's LAN IP, or run the hub natively.
services:
  tempsensor:
    build: .
    container_name: tempsensor
    restart: unless-stopped
    network_mode: host          # needed for mDNS discovery on the LAN
    volumes:
      - ./data:/data            # temperature_log.csv, logs, config persist here
    environment:
      - PORT=8080
      # - SERVER_TOKEN=change-me        # pin the device token (else auto-generated)
      # - PUBLIC_BASE=http://192.168.1.50:8080

  # Alternative for Docker Desktop (no host networking / no mDNS auto-discovery):
  # tempsensor-bridge:
  #   build: .
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./data:/data
  #   environment:
  #     - MDNS_ENABLE=0
