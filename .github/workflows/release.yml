name: release

# Build one-click installers for Windows (.exe), macOS (.dmg) and Linux (.tar.gz)
# on native runners and attach them to a GitHub Release. Push a tag like v2.4.0,
# or run manually with a version. Installers are SIGNED only if the relevant
# secrets are configured (see docs/RELEASE_SIGNING.md); otherwise they build
# unsigned so the pipeline still works for forks/contributors.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version, e.g. 2.4.0"
        required: true

permissions:
  contents: write   # create the release and upload assets

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

  linux:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build onedir bundle
        run: ./packaging/build.sh
      - name: Package tarball
        run: |
          tar -C dist -czf "dist/Setpoint-linux-x64-${{ needs.meta.outputs.version }}.tar.gz" temperature-hub
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          files: dist/Setpoint-linux-x64-*.tar.gz

  windows:
    needs: meta
    runs-on: windows-latest
    env:
      HAS_WIN_CERT: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build onedir bundle
        shell: cmd
        run: packaging\build.bat
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Compile installer
        run: iscc "/DAppVersion=${{ needs.meta.outputs.version }}" packaging\windows\setpoint.iss
      - name: Sign installer
        if: env.HAS_WIN_CERT == 'true'
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $setup = Get-ChildItem dist\installer\Setpoint-Setup-*.exe | Select-Object -First 1
          & signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 $setup.FullName
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          files: dist/installer/Setpoint-Setup-*.exe

  macos:
    needs: meta
    runs-on: macos-latest
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERT_BASE64 != '' }}
      HAS_NOTARY_KEY: ${{ secrets.APPLE_API_KEY_BASE64 != '' }}
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Import Developer ID certificate
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          echo "$APPLE_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN"
      - name: Write notary API key
        if: env.HAS_APPLE_CERT == 'true' && env.HAS_NOTARY_KEY == 'true'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/nkey.p8"
      - name: Build signed .dmg
        env:
          TEMPSENSOR_VERSION: ${{ needs.meta.outputs.version }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.HAS_NOTARY_KEY == 'true' && format('{0}/nkey.p8', runner.temp) || '' }}
        run: ./packaging/macos/build_dmg.sh
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          files: dist/installer/Setpoint-*.dmg
