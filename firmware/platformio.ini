; =============================================================================
; ThermaProbe reference firmware -- PlatformIO project
; =============================================================================
; Product : ThermaProbe (temperature probe for the ThermaHub appliance)
; MCU     : ESP32-WROOM-32E (generic "esp32dev" board)
; Framework: Arduino (chosen for accessibility to small makers)
; Protocol: v1 (matches ThermaHub CANONICAL SPEC)
;
; Build/flash:
;     pio run                 # compile
;     pio run -t upload       # flash over USB
;     pio device monitor      # serial console @ 115200
;   or use the guided factory helper:  python factory_flash.py
;
; Sensor selection is a compile-time choice via build_flags below:
;     -D SENSOR_DS18B20   (default) 1-Wire DS18B20 on ONE_WIRE_BUS
;     -D SENSOR_MAX31855  optional K-type thermocouple over SPI
; Pin assignments live in src/protocol.h so hardware (docs/BOM.md,
; docs/ASSEMBLY.md) and firmware can never drift.
; =============================================================================

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform  = espressif32
board     = esp32dev            ; ESP32-WROOM-32E module
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; --- Sensor back-end selection -----------------------------------------------
; Default build: DS18B20 (1-Wire). To build the thermocouple variant instead,
; comment the DS18B20 line and uncomment the MAX31855 line (and its lib_dep).
build_flags =
    -D SENSOR_DS18B20
;   -D SENSOR_MAX31855

; --- Pinned library dependencies ---------------------------------------------
; Versions are pinned so a factory build today reproduces byte-for-byte later.
lib_deps =
    paulstoffregen/OneWire@2.3.8
    milesburton/DallasTemperature@3.11.0
    bblanchon/ArduinoJson@6.21.5
;   adafruit/Adafruit MAX31855 library@1.4.2   ; uncomment for SENSOR_MAX31855
